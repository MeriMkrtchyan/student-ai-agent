<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student AI Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f7fa; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
        #upload-section { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        #upload-section input[type="file"] { flex: 1; min-width: 200px; }
        #upload-status { font-size: 13px; color: #2a7; font-weight: 500; }
        #upload-status.error { color: #c33; }
        #chat { background: white; border: 1px solid #ddd; border-radius: 8px; height: 450px; overflow-y: auto; padding: 15px; margin-bottom: 15px; }
        .message { margin-bottom: 12px; line-height: 1.5; }
        .message .label { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; display: block; }
        .user .label { color: #1b4f8a; }
        .assistant .label { color: #1b6b3a; }
        .assistant { background: #f0f4f8; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #1b6b3a; }
        .system { font-size: 12px; color: #888; text-align: center; margin: 8px 0; }
        #input-row { display: flex; gap: 10px; }
        #question { flex: 1; padding: 12px 14px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px 20px; font-size: 15px; background: #1b4f8a; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #153d6e; }
        button:disabled { background: #999; cursor: not-allowed; }
        .tools-badge { font-size: 11px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>Student AI Assistant</h1>
    <div class="subtitle">Ask school questions or upload documents for the agent to search</div>
    
    <div id="upload-section">
        <input type="file" id="fileInput" accept=".pdf,.txt">
        <button onclick="uploadFile()">Upload Document</button>
        <span id="upload-status"></span>
    </div>
    
    <div id="chat">
        <div class="system">Welcome! Ask a question or upload a PDF/TXT file to get started.</div>
    </div>
    
    <div id="input-row">
        <input type="text" id="question" placeholder="Ask about your homework..." onkeypress="if(event.key==='Enter') send()">
        <button id="sendBtn" onclick="send()">Ask</button>
    </div>

    <script>
        let history = [];
        
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('upload-status');
            const file = fileInput.files[0];
            
            if (!file) {
                status.textContent = "Select a file first";
                status.className = "error";
                return;
            }
            
            status.textContent = "Uploading...";
            status.className = "";
            
            const form = new FormData();
            form.append('file', file);
            
            try {
                const r = await fetch('/upload', { method: 'POST', body: form });
                const data = await r.json();
                
                if (r.ok && data.status === 'success') {
                    status.textContent = "Uploaded (" + data.chunks_stored + " chunks)";
                    status.className = "";
                    addSystemMessage('Document "' + data.filename + '" uploaded -- ' + data.chunks_stored + ' chunks stored.');
                } else {
                    status.textContent = (data.detail || 'Upload failed');
                    status.className = "error";
                }
            } catch (e) {
                status.textContent = "Network error";
                status.className = "error";
            }
            
            fileInput.value = "";
        }
        
        async function send() {
            const input = document.getElementById('question');
            const btn = document.getElementById('sendBtn');
            const q = input.value.trim();
            
            if (!q) return;
            
            addMessage('user', q);
            input.value = '';
            btn.disabled = true;
            btn.textContent = 'Thinking...';
            
            try {
                const r = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q, history: history })
                });
                const data = await r.json();
                
                if (r.ok) {
                    history = data.history;
                    addMessage('assistant', data.answer, data.tools_used);
                } else {
                    addSystemMessage("Error: " + (data.detail || 'Something went wrong'));
                }
            } catch (e) {
                addSystemMessage("Error: Could not reach the server. Is it running?");
            }
            
            btn.disabled = false;
            btn.textContent = 'Ask';
        }
        
        function addMessage(role, text, toolsUsed) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'message ' + role;
            
            let html = '<span class="label">' + (role === 'user' ? 'You' : 'Agent') + '</span>';
            html += '<div>' + escapeHtml(text).replace(/\n/g, '<br>') + '</div>';
            
            if (toolsUsed && toolsUsed.length > 0) {
                html += '<div class="tools-badge">Tools used: ' + toolsUsed.join(', ') + '</div>';
            }
            
            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'system';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
